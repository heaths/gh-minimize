name: ci

on:
  pull_request:
  push:
    branches:
    - main
  workflow_call:
    inputs:
      release:
        description: Whether this is running as part of a release workflow.
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    shell: bash

env:
  GOVERSION: "1.24"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: windows-latest
          goos: windows
          lint: true
        - os: ubuntu-latest
          goos: linux
          lint: true
        - os: macos-latest
          goos: darwin
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Set up Go ${{ env.GOVERSION }}
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version: ${{ env.GOVERSION }}
        cache: false # Set to `true` when dependencies are added.
    - name: Test
      run: GOOS=${{ matrix.goos }} go test ./... -cover -v
    - name: Lint
      if: ${{ !cancelled() && matrix.lint }}
      # cspell:ignore golangci
      uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
      with:
        only-new-issues: true

  check:
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    needs:
    - test
    steps:
    - name: Check
      run: |
        if [[ "${{ needs.test.result }}" == "success" ]]; then
          echo -e "\e[32mSuccess\e[0m"
        else
          echo -e "\e[31mFailed\e[0m"
          exit 1
        fi
